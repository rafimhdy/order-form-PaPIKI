openapi: "3.0.3"
info:
  title: Kopi Tubruk Store API
  version: "1.0.0"
  description: |
    REST API untuk sistem pemesanan kopi online (Kopi Tubruk Premium Store).

    API ini mendukung 3 mode pemesanan yang berbeda tergantung jenis klien
    (guest checkout, form sederhana, atau aplikasi terdaftar), serta
    terintegrasi dengan **bot notifikasi Telegram** yang otomatis mengirim
    pesan ke admin toko setiap kali ada pesanan baru yang berhasil dibuat.

    ## Changelog
    | Versi | Tanggal | Perubahan |
    |-------|---------|-----------|
    | 1.0.0 | 2026-06-14 | Initial release: Orders, Users, Products endpoints |

  contact:
    name: Muhammad Rafi Mahdy
    email: hello@mrafimahdy.works

servers:
  - url: http://localhost:4000/api
    description: Server Lokal (Development)

tags:
  - name: Orders
    description: Manajemen pesanan, termasuk 3 mode pembuatan pesanan dan integrasi notifikasi Telegram.
  - name: Users
    description: Manajemen akun user dan admin.
  - name: Products
    description: Manajemen katalog produk dan stok gudang.

paths:
  /orders:
    post:
      tags:
        - Orders
      summary: Membuat pesanan baru (Public)
      description: |
        Endpoint ini support **3 mode pengiriman data** yang berbeda,
        tergantung jenis klien yang melakukan request. Pilih schema yang
        sesuai dengan kebutuhan:

        | Mode | Kapan Digunakan | Autentikasi |
        |------|------------------|-------------|
        | **Mode 1 Cart Checkout** | Pengunjung guest yang checkout langsung dari keranjang belanja, tanpa perlu login. | Tidak perlu |
        | **Mode 2 Single Frontend Form** | Form pemesanan sederhana satu produk, biasanya dari landing page promosi. | Tidak perlu |
        | **Mode 3 Registered API Mode** | Klien eksternal atau aplikasi mobile yang mengelola user terdaftar sendiri. | Membutuhkan `user` ID yang valid |

        ### Side Effect: Notifikasi Telegram
        Setiap pesanan yang **berhasil dibuat** (response `201`) akan otomatis
        memicu pengiriman notifikasi ke **bot Telegram internal toko**, berisi
        ringkasan detail pesanan. Proses ini berjalan secara asynchronous di
        background dan tidak akan menggagalkan response API meskipun notifikasi
        Telegram gagal terkirim (misal karena bot token invalid atau timeout).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/OrderCartRequest"
                - $ref: "#/components/schemas/OrderFormRequest"
                - $ref: "#/components/schemas/OrderAPIRequest"
      responses:
        "201":
          description: Pesanan berhasil dibuat dan notifikasi Telegram telah dikirim ke admin.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  id:
                    type: string
                    example: "64f1c7a3c4d5e6f7a8b9c0f5"
        "400":
          description: Bad Request — stok tidak cukup atau produk tidak ditemukan.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Stok produk tidak cukup."
        "422":
          description: Dokumen gagal divalidasi oleh sistem database (Schema Validation Error).
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: false
                  message:
                    type: string
                    example: "Field 'items' wajib diisi."

    get:
      tags:
        - Orders
      summary: Mendapatkan semua daftar pesanan (Admin Only)
      description: |
        Mengembalikan seluruh data pesanan yang tersimpan di sistem.

        **Catatan:** Endpoint ini belum mengimplementasikan pagination.
        Untuk volume data besar, seluruh hasil akan dikembalikan dalam satu
        response, gunakan parameter filter di bawah untuk mempersempit hasil.
      security:
        - BearerAuth: []
      parameters:
        - name: user
          in: query
          required: false
          description: Filter berdasarkan ID User tertentu.
          schema:
            type: string
        - name: status
          in: query
          required: false
          description: Filter berdasarkan status pesanan.
          schema:
            type: string
            enum: [pending, shipped, cancelled]
      responses:
        "200":
          description: Berhasil mengambil daftar pesanan.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrderResponse"
        "401":
          description: Unauthorized — token tidak valid atau tidak disertakan.

  /orders/{id}:
    get:
      tags:
        - Orders
      summary: Mendapatkan detail satu pesanan (Admin Only)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID unik pesanan (MongoDB ObjectId).
          schema:
            type: string
      responses:
        "200":
          description: Data pesanan ditemukan.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "404":
          description: Pesanan tidak ditemukan.

    put:
      tags:
        - Orders
      summary: Memperbarui status atau item pesanan (Admin Only)
      description: |
        Mengubah status pesanan. Perubahan status memiliki **efek otomatis**
        terhadap stok produk terkait di gudang:

        - Status diubah ke **`shipped`** → stok produk otomatis **dipotong**.
        - Status diubah ke **`cancelled`** → stok produk otomatis **dikembalikan**.
        - Status **`pending`** → tidak ada perubahan stok.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [pending, shipped, cancelled]
                  example: "shipped"
      responses:
        "200":
          description: Pesanan berhasil diperbarui dan stok produk telah disesuaikan.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderResponse"
        "404":
          description: Pesanan tidak ditemukan.

    delete:
      tags:
        - Orders
      summary: Menghapus pesanan dari sistem (Admin Only)
      description: |
        **Perhatian:** Endpoint ini menghapus data pesanan secara permanen
        dan **tidak** mengembalikan stok produk yang sudah dipotong sebelumnya.
        Gunakan status `cancelled` melalui endpoint PUT jika tujuannya adalah
        membatalkan pesanan dan mengembalikan stok.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Pesanan berhasil dihapus.
        "404":
          description: Pesanan tidak ditemukan.

  /users:
    get:
      tags:
        - Users
      summary: Mendapatkan semua daftar user (Admin Only)
      description: |
        Mengembalikan seluruh data user yang terdaftar di sistem.

        **Catatan:** Endpoint ini belum mengimplementasikan pagination.
        Disarankan hanya digunakan untuk volume data kecil hingga menengah.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Berhasil mengambil daftar user.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserResponse"
        "401":
          description: Unauthorized.
        "500":
          description: Server error.

    post:
      tags:
        - Users
      summary: Membuat user baru (Admin Only)
      description: Mendaftarkan user atau admin baru ke dalam sistem.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRequest"
      responses:
        "201":
          description: User berhasil dibuat.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          description: Input tidak lengkap, field `name` dan `email` wajib diisi.
        "409":
          description: Email sudah terdaftar.

  /users/{id}:
    get:
      tags:
        - Users
      summary: Mendapatkan detail user berdasarkan ID
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID unik user (MongoDB ObjectId).
          schema:
            type: string
      responses:
        "200":
          description: User ditemukan.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          description: Format ID tidak valid.
        "404":
          description: User tidak ditemukan.

    put:
      tags:
        - Users
      summary: Memperbarui data user
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRequest"
      responses:
        "200":
          description: Data user berhasil diperbarui.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          description: Format ID atau data tidak valid.
        "404":
          description: User tidak ditemukan.
        "409":
          description: Email baru sudah digunakan orang lain.

    delete:
      tags:
        - Users
      summary: Menghapus user
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User berhasil dihapus.
        "400":
          description: Format ID tidak valid.
        "404":
          description: User tidak ditemukan.

  /products:
    get:
      tags:
        - Products
      summary: Mendapatkan semua katalog produk (Public)
      description: |
        Mengembalikan daftar seluruh produk yang tersedia di gudang/database.

        **Catatan:** Endpoint ini belum mengimplementasikan pagination.
        Untuk katalog dengan jumlah produk besar, pertimbangkan penggunaan
        parameter filter di versi API selanjutnya.
      responses:
        "200":
          description: Berhasil mengambil data produk.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
        "500":
          description: Server bermasalah.

    post:
      tags:
        - Products
      summary: Menambahkan produk baru ke database (Admin Only)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Product"
      responses:
        "201":
          description: Produk berhasil dibuat.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "401":
          description: Unauthorized — token tidak valid atau tidak disertakan.
        "400":
          description: Data tidak valid.
        "500":
          description: Server bermasalah.

  /products/{id}:
    get:
      tags:
        - Products
      summary: Mendapatkan detail satu produk spesifik (Public)
      parameters:
        - name: id
          in: path
          required: true
          description: ID unik produk (MongoDB ObjectId).
          schema:
            type: string
      responses:
        "200":
          description: Produk ditemukan.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Produk tidak ditemukan.

    put:
      tags:
        - Products
      summary: Memperbarui data produk (Admin Only)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Product"
      responses:
        "200":
          description: Produk berhasil diperbarui.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Produk tidak ditemukan.

    delete:
      tags:
        - Products
      summary: Menghapus produk (Admin Only)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Produk berhasil dihapus.
        "404":
          description: Produk tidak ditemukan.

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Token JWT yang didapat setelah proses login admin. Sertakan di header:
        `Authorization: Bearer {token}`

  schemas:
    OrderItem:
      type: object
      properties:
        productId:
          type: string
          example: "64f1a2b3c4d5e6f7a8b9c0d1"
        name:
          type: string
          example: "Kopi Tubruk Premium"
        qty:
          type: integer
          example: 2

    OrderCartRequest:
      title: Mode 1 - Cart Checkout (Anonymous)
      description: Digunakan untuk guest checkout dari keranjang belanja, tanpa memerlukan login.
      type: object
      required:
        - items
      properties:
        name:
          type: string
          example: "Rafi Guest"
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"

    OrderFormRequest:
      title: Mode 2 - Single Frontend Form
      description: Digunakan untuk form pemesanan satu produk sederhana, biasanya dari landing page promosi.
      type: object
      required:
        - coffee_type
      properties:
        name:
          type: string
          example: "Salma"
        coffee_type:
          type: string
          description: Menggunakan slug atau nama produk yang mendekati.
          example: "kopitubrukpremium"
        quantity:
          type: integer
          example: 1

    OrderAPIRequest:
      title: Mode 3 - Registered API Mode
      description: Digunakan oleh klien eksternal atau aplikasi yang sudah mengelola data user terdaftar sendiri.
      type: object
      required:
        - user
        - items
      properties:
        user:
          type: string
          description: ID User berwujud ObjectId MongoDB yang sah dan sudah terdaftar di sistem.
          example: "64f1b5e9c4d5e6f7a8b9c0e2"
        status:
          type: string
          default: "pending"
          example: "pending"
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"

    OrderResponse:
      type: object
      properties:
        _id:
          type: string
          example: "64f1c7a3c4d5e6f7a8b9c0f5"
        name:
          type: string
          example: "Rafi Guest"
        user:
          type: string
          nullable: true
          example: "64f1b5e9c4d5e6f7a8b9c0e2"
        status:
          type: string
          enum: [pending, shipped, cancelled]
          example: "pending"
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
        createdAt:
          type: string
          format: date-time
          example: "2026-06-14T10:30:00.000Z"

    UserRequest:
      type: object
      required:
        - name
        - email
      properties:
        name:
          type: string
          example: "Muhammad Rafi"
        email:
          type: string
          format: email
          example: "rafi@toko.com"
        password:
          type: string
          format: password
          example: "securepassword123"
        isAdmin:
          type: boolean
          default: false
          example: false

    UserResponse:
      type: object
      properties:
        _id:
          type: string
          example: "64f1b5e9c4d5e6f7a8b9c0e2"
        name:
          type: string
          example: "Muhammad Rafi"
        email:
          type: string
          example: "rafi@toko.com"
        isAdmin:
          type: boolean
          example: false

    Product:
      type: object
      properties:
        _id:
          type: string
          example: "64f1a2b3c4d5e6f7a8b9c0d1"
        name:
          type: string
          example: "Kopi Tubruk Premium"
        slug:
          type: string
          example: "kopitubrukpremium"
        price:
          type: integer
          default: 10000
          example: 15000
        description:
          type: string
          example: "Kopi hitam tradisional dengan cita rasa pekat."
        stock:
          type: integer
          default: 100
          example: 50
        image:
          type: string
          example: "https://toko.com/images/kopi.jpg"
