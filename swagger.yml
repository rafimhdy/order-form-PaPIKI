openapi: "3.0.3"
info:
  title: API Title
  version: "1.0"
servers:
  - url: http://localhost:4000/api
    description: Server Lokal (Development)
paths:
  /orders:
    post:
      tags:
        - Orders
      summary: Membuat pesanan baru (Public)
      description: Mendukung 3 mode pengiriman data (Cart Checkout, Single Form, atau Registered API Mode). Pesanan yang berhasil akan memicu notifikasi bot Telegram ke pihak internal toko.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/OrderCartRequest"
                - $ref: "#/components/schemas/OrderFormRequest"
                - $ref: "#/components/schemas/OrderAPIRequest"
      responses:
        "201":
          description: Pesanan berhasil dibuat
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  id:
                    type: string
                    example: "64f1c7a3c4d5e6f7a8b9c0f5"
        "400":
          description: Bad Request (Stok tidak cukup atau produk tidak ditemukan)
        "422":
          description: Dokumen gagal divalidasi oleh sistem database (Schema Validation Error)

    get:
      tags:
        - Orders
      summary: Mendapatkan semua daftar pesanan (Admin Only)
      security:
        - BearerAuth: []
      parameters:
        - name: user
          in: query
          required: false
          description: Filter berdasarkan ID User tertentu
          schema:
            type: string
        - name: status
          in: query
          required: false
          description: Filter berdasarkan status pesanan (pending, shipped, cancelled)
          schema:
            type: string
            enum: [pending, shipped, cancelled]
      responses:
        "200":
          description: Berhasil mengambil daftar pesanan
        "401":
          description: Unauthorized

  /orders/{id}:
    get:
      tags:
        - Orders
      summary: Mendapatkan detail satu pesanan (Admin Only)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Data pesanan ditemukan
        "404":
          description: Pesanan tidak ditemukan

    put:
      tags:
        - Orders
      summary: Memperbarui status atau item pesanan (Admin Only)
      description: Mengubah status pesanan. Mengubah status ke 'shipped' atau 'cancelled' akan otomatis memotong atau mengembalikan jumlah stok produk terkait di gudang.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [pending, shipped, cancelled]
                  example: "shipped"
      responses:
        "200":
          description: Pesanan berhasil diperbarui

    delete:
      tags:
        - Orders
      summary: Menghapus pesanan dari sistem (Admin Only)
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Pesanan berhasil dihapus
  /users:
    get:
      tags:
        - Users
      summary: Mendapatkan semua daftar user
      description: Mengembalikan seluruh data user yang terdaftar di sistem. Membutuhkan hak akses Admin.
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Berhasil mengambil daftar user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserResponse"
        "401":
          description: Unauthorized
        "500":
          description: Server error

    post:
      tags:
        - Users
      summary: Membuat user baru
      description: Mendaftarkan user atau admin baru ke dalam sistem. Membutuhkan hak akses Admin.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRequest"
      responses:
        "201":
          description: User berhasil dibuat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          description: Input tidak lengkap (name dan email wajib)
        "409":
          description: Email sudah terdaftar

  /users/{id}:
    get:
      tags:
        - Users
      summary: Mendapatkan detail user berdasarkan ID
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: ID unik user
          schema:
            type: string
      responses:
        "200":
          description: User ditemukan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          description: Format ID tidak valid
        "404":
          description: User tidak ditemukan

    put:
      tags:
        - Users
      summary: Memperbarui data user
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRequest"
      responses:
        "200":
          description: Data user berhasil diperbarui
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          description: Format ID atau data tidak valid
        "404":
          description: User tidak ditemukan
        "409":
          description: Email baru sudah digunakan orang lain

    delete:
      tags:
        - Users
      summary: Menghapus user
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User berhasil dihapus
        "400":
          description: Format ID tidak valid
        "404":
          description: User tidak ditemukan

  /products:
    get:
      tags:
        - Products
      summary: Mendapatkan semua katalog produk
      description: Mengembalikan daftar seluruh produk yang tersedia di gudang/database.
      responses:
        "200":
          description: Berhasil mengambil data produk
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
        "500":
          description: Server bermasalah

    post:
      tags:
        - Products
      summary: Menambahkan produk baru ke database
      description: Membuat entri produk baru. Membutuhkan hak akses Admin.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Product"
      responses:
        "201":
          description: Produk berhasil dibuat
        "401":
          description: Unauthorized. Token tidak valid atau tidak disertakan.
        "400":
          description: Data tidak valid
        "500":
          description: Server bermasalah

  /products/{id}:
    get:
      tags:
        - Products
      summary: Mendapatkan detail satu produk spesifik
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Produk ditemukan
        "404":
          description: Produk tidak ditemukan

    put:
      tags:
        - Products
      summary: Memperbarui data produk
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Product"
      responses:
        "200":
          description: Produk berhasil diperbarui

    delete:
      tags:
        - Products
      summary: Menghapus produk
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Produk berhasil dihapus

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    OrderItem:
      type: object
      properties:
        productId:
          type: string
          example: "64f1a2b3c4d5e6f7a8b9c0d1"
        name:
          type: string
          example: "Kopi Tubruk Premium"
        qty:
          type: integer
          example: 2

    OrderCartRequest:
      title: Mode 1 - Cart Checkout (Anonymous)
      type: object
      required:
        - items
      properties:
        name:
          type: string
          example: "Rafi Guest"
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"

    OrderFormRequest:
      title: Mode 2 - Single Frontend Form
      type: object
      required:
        - coffee_type
      properties:
        name:
          type: string
          example: "Salma"
        coffee_type:
          type: string
          description: Menggunakan slug atau kemiripan nama produk
          example: "kopitubrukpremium"
        quantity:
          type: integer
          example: 1

    OrderAPIRequest:
      title: Mode 3 - Registered API Mode
      type: object
      required:
        - user
        - items
      properties:
        user:
          type: string
          description: ID User berwujud ObjectId MongoDB yang sah
          example: "64f1b5e9c4d5e6f7a8b9c0e2"
        status:
          type: string
          default: "pending"
          example: "pending"
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
    UserRequest:
      type: object
      required:
        - name
        - email
      properties:
        name:
          type: string
          example: "Muhammad Rafi"
        email:
          type: string
          format: email
          example: "rafi@toko.com"
        password:
          type: string
          format: password
          example: "securepassword123"
        isAdmin:
          type: boolean
          default: false
          example: false

    UserResponse:
      type: object
      properties:
        _id:
          type: string
          example: "64f1b5e9c4d5e6f7a8b9c0e2"
        name:
          type: string
          example: "Muhammad Rafi"
        email:
          type: string
          example: "rafi@toko.com"
        isAdmin:
          type: boolean
          example: false

    Product:
      type: object
      properties:
        _id:
          type: string
          example: "64f1a2b3c4d5e6f7a8b9c0d1"
        name:
          type: string
          example: "Kopi Tubruk Premium"
        slug:
          type: string
          example: "kopitubrukpremium"
        price:
          type: integer
          default: 10000
          example: 15000
        description:
          type: string
          example: "Kopi hitam tradisional dengan cita rasa pekat."
        stock:
          type: integer
          default: 100
          example: 50
        image:
          type: string
          example: "https://toko.com/images/kopi.jpg"
